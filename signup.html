<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Sign Up | SRI GIFTS</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
        }

        .error-msg {
            color: red;
            margin-top: 1rem;
            display: none;
        }

        .success-msg {
            color: #25D366;
            margin-top: 1rem;
            display: none;
            font-weight: bold;
        }

        .auth-link {
            margin-top: 1.5rem;
            display: block;
            color: var(--accent-color);
            text-decoration: none;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">SRI <span>GIFTS</span></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="track-order.html">Track Order</a></li>
            </ul>
        </nav>
    </header>
    <div class="auth-container">
        <h2>Create an Account</h2><br>
        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            <p id="error-msg" class="error-msg">Sign up failed.</p>
            <p id="success-msg" class="success-msg">Account created! Redirecting to login...</p>
        </form>
        <a href="login.html" class="auth-link">Already have an account? Login</a>
    </div>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const mobile = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, mobile, password, name })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('success-msg').style.display = 'block';
                    document.getElementById('error-msg').style.display = 'none';
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    document.getElementById('error-msg').textContent = data.error || 'Sign up failed';
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('error-msg').textContent = 'Server error';
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>

</html>
