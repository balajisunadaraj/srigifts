<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category | SRI GIFTS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">SRI GIFTS</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li class="dropdown">
                    <a href="products.html">Products ▼</a>
                    <div class="dropdown-content">
                        <a href="category.html?cat=Personalized">Personalized Gifts</a>
                        <a href="category.html?cat=Keychains">Keychains</a>
                        <a href="category.html?cat=3D%20Printed">3D Printed</a>
                        <a href="category.html?cat=Frames">Frames</a>
                    </div>
                </li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="track-order.html">Track Order</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-header">
        <h1 id="category-title">Loading Category...</h1>
        <p>Premium customized gifts tailored for you.</p>
    </div>

    <section class="container" style="padding-top: 2rem;">
        <div class="grid" id="category-grid">
            <!-- Dynamic products will be rendered here -->
            <p style="grid-column: 1/-1; text-align:center; color: var(--text-light);">Loading products...</p>
        </div>
    </section>

    <!-- Floating Elements -->
    <div class="floating-cart" title="View Cart">
        <span class="cart-count">0</span>
        <svg viewBox="0 0 24 24">
            <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1.003 1.003 0 0 0 20 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z" />
        </svg>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            let cat = params.get('cat');
            if(cat === 'Personalized') cat = 'Personalized';
            // Wait for products to load from script.js, we can do it directly here or modify script.js
            document.getElementById('category-title').textContent = cat ? (cat + ' Gifts') : 'All Gifts';
        });
    </script>
</body>
</html>
